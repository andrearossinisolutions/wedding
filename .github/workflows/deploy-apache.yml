name: Deploy To Apache (Self-Hosted)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Deploy to Apache web root
        run: |
          sudo /usr/local/bin/wedding-deploy-dynamic-wedding "$GITHUB_WORKSPACE/out"
